<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emigration Clearance Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
        }

        .doc-container {
            width: 440px;
            margin: 0 auto;
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding-bottom: 20px;
        }

        .doc-row {
            display: flex;
            border-bottom: 1px solid #e5e7eb;
        }

        .doc-row:last-child {
            border-bottom: none;
        }

        .doc-label {
            width: 45%;
            padding: 6px 12px;
            font-size: 11px;
            color: #6b7280;
            border-right: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
        }

        .doc-val {
            width: 55%;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #111827;
            display: flex;
            align-items: center;
        }

        @media print {
            body {
                background-color: white;
            }

            .print\:hidden {
                display: none !important;
            }

            .doc-container {
                box-shadow: none;
                border: none;
                padding: 0;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const QRCodeDisplay = ({ text }) => {
            const qrRef = useRef(null);
            useEffect(() => {
                if (qrRef.current && text) {
                    qrRef.current.innerHTML = '';
                    try {
                        new QRCode(qrRef.current, {
                            text: text,
                            width: 180,
                            height: 180,
                            correctLevel: QRCode.CorrectLevel.L
                        });
                    } catch(e) {
                        qrRef.current.innerHTML = '<p class="text-red-500 text-xs mt-4">Data too large for QR Code</p>';
                    }
                }
            }, [text]);
            return <div ref={qrRef} className="flex justify-center mb-4"></div>;
        };

        const keyMap = {
            name: 'n', birth_date: 'b', blood_group: 'bg', ec_no: 'e', ec_date: 'ed',
            passport_no: 'p', passport_issue_date: 'pi', passport_expire_date: 'pe',
            visa_no: 'v', visa_issue_date: 'vi', visa_expire_date: 've', referral_no: 'r',
            bmet_no: 'bm', gender: 'g', nid: 'nd', employer: 'em', country: 'c',
            agency_name: 'an', agency_license: 'al', agency_phone: 'ap', house: 'h',
            post_office: 'po', police_station: 'ps', upazila: 'u', district: 'd',
            division: 'dv', ec_name: 'en', ec_relation: 'er', ec_mobile: 'emob', ec_address: 'ea'
        };
        const reverseKeyMap = Object.keys(keyMap).reduce((acc, key) => {
            acc[keyMap[key]] = key;
            return acc;
        }, {});

        const App = () => {
            const [view, setView] = useState('form');
            const [photoPreview, setPhotoPreview] = useState('');
            const [shareUrl, setShareUrl] = useState('');
            const [isViewer, setIsViewer] = useState(false);

            const [formData, setFormData] = useState({
                name: 'KAMAL HOSSAIN',
                birth_date: '1981-02-06',
                blood_group: 'O+',
                ec_no: 'SA-E-2026-6155944',
                ec_date: '14/May/2026',
                passport_no: 'A13417563',
                passport_issue_date: '2023-12-07',
                passport_expire_date: '2033-12-06',
                visa_no: '6162481033',
                visa_issue_date: '2026-05-07',
                visa_expire_date: '2026-08-05',
                referral_no: '1305826263',
                bmet_no: 'FNM20266003027G',
                gender: 'Male',
                nid: '1525537096',
                employer: 'Gemini Summer Company',
                country: 'Saudi Arabia',
                agency_name: 'M/S SINCERE TRADERS',
                agency_license: 'RL0130',
                agency_phone: '01707857533',
                house: 'JOYNARAYANPUR',
                post_office: 'Rajapur - 3923',
                police_station: 'DAGANBHUIYAN',
                upazila: 'Daganbhuiyan',
                district: 'Feni',
                division: 'Chattagram',
                ec_name: '',
                ec_relation: '',
                ec_mobile: '',
                ec_address: ''
            });

            useEffect(() => {
                const url = window.location.href;
                let encodedData = '';
                
                // Check both query param and hash fragment for the encoded data
                if (url.includes('?data=')) {
                    encodedData = url.split('?data=')[1];
                } else if (url.includes('#data=')) {
                    encodedData = url.split('#data=')[1];
                }
                
                if (encodedData) {
                    try {
                        // Extract only valid LZString URI-safe base64 characters to ignore any appended query parameters, slashes, or tracking tokens
                        const match = encodedData.match(/^[A-Za-z0-9\+\-\$]+/);
                        if (match) {
                            encodedData = match[0];
                        }
                        
                        const jsonString = LZString.decompressFromEncodedURIComponent(encodedData);
                        if (!jsonString) throw new Error("Decompression returned null or empty");
                        
                        const rawData = JSON.parse(jsonString);
                        
                        const data = {};
                        for (const shortKey in rawData) {
                            if (shortKey === 'ph' || shortKey === 'p') continue;
                            const fullKey = reverseKeyMap[shortKey] || shortKey;
                            data[fullKey] = rawData[shortKey];
                        }
                        
                        // Extract photo if present
                        if (rawData.ph) {
                            setPhotoPreview(rawData.ph);
                        } else if (rawData.p) {
                            setPhotoPreview(rawData.p); // For backward compatibility
                        }
                        
                        setFormData(prev => ({ ...prev, ...data }));
                        setView('document');
                        setIsViewer(true);
                        setShareUrl(url);
                    } catch (e) {
                        console.error('Failed to parse URL data', e);
                        setView('error');
                    }
                }
            }, []);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const MAX_WIDTH = 55;
                            const MAX_HEIGHT = 55;
                            let width = img.width;
                            let height = img.height;
                            if (width > height) {
                                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            } else {
                                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                            }
                            canvas.width = width; canvas.height = height;
                            ctx.drawImage(img, 0, 0, width, height);
                            // Ultra compression for QR Code capacity
                            const compressed = canvas.toDataURL('image/jpeg', 0.15);
                            setPhotoPreview(compressed);
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

             const generateDocument = () => {
                // Shorten keys for maximum URL efficiency to keep URL very small
                const dataToEncode = {};
                for (const key in formData) {
                    if (formData[key]) { // Only include non-empty values
                        const shortKey = keyMap[key] || key;
                        dataToEncode[shortKey] = formData[key];
                    }
                }
                if (photoPreview) {
                    dataToEncode.ph = photoPreview; // Include compressed photo
                }
                
                const jsonString = JSON.stringify(dataToEncode);
                const encodedData = LZString.compressToEncodedURIComponent(jsonString);
                
                // Construct URL with query parameters instead of hash to ensure no platform strips it
                const basePath = window.location.href.split('#')[0].split('?')[0];
                const url = `${basePath}?data=${encodedData}`;
                
                setShareUrl(url);

                // Update history to reflect share URL
                window.history.pushState(null, null, `?data=${encodedData}`);
                setView('document');
                setIsViewer(false);
            };

            const resetForm = () => {
                window.history.pushState(null, null, window.location.pathname);
                setView('form');
            };

            const copyLink = () => {
                navigator.clipboard.writeText(shareUrl);
                alert("Link copied to clipboard!");
            };

            if (view === 'error') {
                return (
                    <div className="max-w-md mx-auto mt-20 p-6 bg-white rounded-xl shadow-lg text-center">
                        <div className="text-red-500 mb-4">
                            <svg className="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <h2 className="text-xl font-bold text-gray-800 mb-2">Invalid or Broken Link</h2>
                        <p className="text-gray-600 mb-6">The link you are trying to visit is incomplete or corrupted. Please make sure you copied the entire link.</p>
                    </div>
                );
            }

            if (view === 'form') {
                return (
                    <div className="max-w-4xl mx-auto p-6">
                        <div className="bg-white rounded-xl shadow-lg p-8">
                            <h1 className="text-2xl font-bold text-gray-800 mb-6">Emigration Clearance Generator</h1>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {/* Profile & Clearance */}
                                <div className="space-y-4">
                                    <h2 className="text-lg font-semibold text-green-700 border-b pb-2">Profile & Clearance</h2>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700">Photo</label>
                                        <input type="file" accept="image/*" onChange={handlePhotoUpload} className="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100" />
                                        {photoPreview && <img src={photoPreview} className="mt-2 w-16 h-16 rounded-full object-cover border" />}
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium text-gray-700">Name</label><input type="text" name="name" value={formData.name} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm focus:ring-green-500 focus:border-green-500" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Birth Date</label><input type="text" name="birth_date" value={formData.birth_date} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Blood Group</label><input type="text" name="blood_group" value={formData.blood_group} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">EC No</label><input type="text" name="ec_no" value={formData.ec_no} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">EC Date</label><input type="text" name="ec_date" value={formData.ec_date} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                    </div>
                                </div>

                                {/* Passport & Visa */}
                                <div className="space-y-4">
                                    <h2 className="text-lg font-semibold text-green-700 border-b pb-2">Passport & Visa</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2"><label className="block text-sm font-medium text-gray-700">Passport No</label><input type="text" name="passport_no" value={formData.passport_no} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Passport Issue</label><input type="text" name="passport_issue_date" value={formData.passport_issue_date} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Passport Expire</label><input type="text" name="passport_expire_date" value={formData.passport_expire_date} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div className="col-span-2"><label className="block text-sm font-medium text-gray-700">Visa No</label><input type="text" name="visa_no" value={formData.visa_no} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Visa Issue</label><input type="text" name="visa_issue_date" value={formData.visa_issue_date} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Visa Expire</label><input type="text" name="visa_expire_date" value={formData.visa_expire_date} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div className="col-span-2"><label className="block text-sm font-medium text-gray-700">Referral No</label><input type="text" name="referral_no" value={formData.referral_no} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                    </div>
                                </div>

                                {/* BMET & Agency */}
                                <div className="space-y-4">
                                    <h2 className="text-lg font-semibold text-green-700 border-b pb-2">BMET & Agency</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2"><label className="block text-sm font-medium text-gray-700">BMET No</label><input type="text" name="bmet_no" value={formData.bmet_no} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Gender</label><input type="text" name="gender" value={formData.gender} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">NID</label><input type="text" name="nid" value={formData.nid} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div className="col-span-2"><label className="block text-sm font-medium text-gray-700">Employer</label><input type="text" name="employer" value={formData.employer} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div className="col-span-2"><label className="block text-sm font-medium text-gray-700">Country</label><input type="text" name="country" value={formData.country} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div className="col-span-2"><label className="block text-sm font-medium text-gray-700">Agency Name</label><input type="text" name="agency_name" value={formData.agency_name} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Agency License</label><input type="text" name="agency_license" value={formData.agency_license} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Agency Phone</label><input type="text" name="agency_phone" value={formData.agency_phone} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                    </div>
                                </div>

                                {/* Address & Emergency */}
                                <div className="space-y-4">
                                    <h2 className="text-lg font-semibold text-green-700 border-b pb-2">Address & Emergency</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="col-span-2"><label className="block text-sm font-medium text-gray-700">House/Vill/Road</label><input type="text" name="house" value={formData.house} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Post Office</label><input type="text" name="post_office" value={formData.post_office} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Police Station</label><input type="text" name="police_station" value={formData.police_station} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Upazila</label><input type="text" name="upazila" value={formData.upazila} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">District</label><input type="text" name="district" value={formData.district} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div className="col-span-2"><label className="block text-sm font-medium text-gray-700">Division</label><input type="text" name="division" value={formData.division} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>

                                        <div className="col-span-2 mt-4"><label className="block text-sm font-medium text-gray-700">Emergency Name</label><input type="text" name="ec_name" value={formData.ec_name} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Relation</label><input type="text" name="ec_relation" value={formData.ec_relation} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div><label className="block text-sm font-medium text-gray-700">Mobile</label><input type="text" name="ec_mobile" value={formData.ec_mobile} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                        <div className="col-span-2"><label className="block text-sm font-medium text-gray-700">Address</label><input type="text" name="ec_address" value={formData.ec_address} onChange={handleInputChange} className="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 sm:text-sm" /></div>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-8 pt-6 border-t border-gray-200">
                                <button onClick={generateDocument} className="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                                    Generate Document
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="py-8">
                    {/* Share Section (Shown immediately on Document generation, hidden when printing) */}
                    {!isViewer && (
                        <div className="print:hidden max-w-lg mx-auto bg-white p-6 rounded-lg shadow-md mb-8 text-center border-t-4 border-green-500">
                            <h3 className="text-xl font-bold mb-2 text-gray-800">Your Document is Ready!</h3>
                            <p className="text-sm text-gray-600 mb-4">Scan the QR code or copy the link below to share.</p>
                            
                            <div className="bg-gray-50 p-4 rounded-lg inline-block">
                                <QRCodeDisplay text={shareUrl} />
                            </div>
                            
                            <div className="mt-4 flex flex-col sm:flex-row gap-2">
                                <input type="text" readOnly value={shareUrl} className="flex-1 text-xs p-3 border rounded border-gray-300 bg-gray-50 focus:outline-none" />
                                <button onClick={copyLink} className="bg-blue-600 text-white px-5 py-2 rounded text-sm hover:bg-blue-700 font-medium whitespace-nowrap shadow-sm">Copy Link</button>
                            </div>

                            <div className="mt-6 flex justify-center gap-3 border-t pt-4">
                                <button onClick={resetForm} className="bg-gray-200 text-gray-800 px-5 py-2.5 rounded shadow-sm hover:bg-gray-300 text-sm font-medium">Edit Details</button>
                                <button onClick={() => window.print()} className="bg-green-600 text-white px-5 py-2.5 rounded shadow-sm hover:bg-green-700 text-sm font-medium">Print PDF / Save</button>
                            </div>
                        </div>
                    )}

                    {/* Document View */}
                    <div className="doc-container">
                        {/* Header */}
                        <div className="flex justify-between items-center p-4 border-b border-gray-100">
                            <img src="logo2.png" alt="Logo 2" className="w-12 h-12 object-contain" />
                            <div className="text-center">
                                <div className="font-bold" style={{ color: '#006a4e', fontSize: '14px' }}>গণপ্রজাতন্ত্রী বাংলাদেশ সরকার</div>
                                <div className="font-bold" style={{ color: '#8e24aa', fontSize: '13px' }}>জনশক্তি কর্মসংস্থান ও প্রশিক্ষণ ব্যুরো</div>
                            </div>
                            <img src="1logo.png" alt="Logo 1" className="w-12 h-12 object-contain" />
                        </div>

                        {/* Clearance Block */}
                        <div className="px-6 py-4 text-center">
                            <div className="font-bold text-gray-800 text-[15px] mb-1">বহির্গমন ছাড়পত্র</div>
                            <div className="font-bold text-gray-800 text-[15px] mb-5">Emigration Clearance</div>

                            <div className="flex flex-col items-center mb-5">
                                <img
                                    src={photoPreview || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'}
                                    className="w-[100px] h-[100px] rounded-full object-cover border-2 border-white shadow-sm mb-3 bg-gray-100"
                                    alt="Applicant"
                                />
                                <div className="font-bold text-lg text-black uppercase mb-1">{formData.name}</div>
                                <div className="text-[12px] text-gray-600 space-y-0.5">

                                <div className="doc-row"><div className="doc-label">Country</div><div className="doc-val">{formData.country}</div></div>

                        {/* Function to render standard section */}
                        {(() => {
                            const Section = ({ title, children }) => (

                                            <img src="1logo.png" className="h-5" alt="" />
                                            <img src="logo2.png" className="h-5" alt="" />
                                        </div>
                                    </div>
                                    <div className="border border-gray-200 rounded-sm bg-white">
                                        {children}
                                    </div>
                                </div>
                            );

                            return (
                                <>
                                    <Section title="Recruiting Agency">
                                        <div className="doc-row"><div className="doc-label">Name</div><div className="doc-val">{formData.agency_name}</div></div>
                                        <div className="doc-row"><div className="doc-label">License No</div><div className="doc-val">{formData.agency_license}</div></div>
                                        <div className="doc-row"><div className="doc-label">Phone</div><div className="doc-val">{formData.agency_phone}</div></div>

                                        <div className="doc-row"><div className="doc-label">Gender</div><div className="doc-val">{formData.gender}</div></div>
                                        <div className="doc-row"><div className="doc-label">NID</div><div className="doc-val">{formData.nid}</div></div>
                                    </Section>

                                    <Section title="Passports">
                                        <div className="doc-row"><div className="doc-label">Name</div><div className="doc-val">{formData.name}</div></div>
                                        <div className="doc-row"><div className="doc-label">Passport No 1</div><div className="doc-val">{formData.passport_no}</div></div>
                                    </Section>

                                    <Section title="Permanent Address">
                                        <div className="doc-row"><div className="doc-label">House/Vill/Road</div><div className="doc-val">{formData.house}</div></div>
                                        <div className="doc-row"><div className="doc-label">Post Office</div><div className="doc-val">{formData.post_office}</div></div>
                                        <div className="doc-row"><div className="doc-label">Police Station</div><div className="doc-val">{formData.police_station}</div></div>
                                        <div className="doc-row"><div className="doc-label">Upazila</div><div className="doc-val">{formData.upazila}</div></div>
                                        <div className="doc-row"><div className="doc-label">District</div><div className="doc-val">{formData.district}</div></div>
                                        <div className="doc-row"><div className="doc-label">Division</div><div className="doc-val">{formData.division}</div></div>
                                    </Section>

                                    <Section title="Emergency Contact">
                                        <div className="doc-row"><div className="doc-label">Name</div><div className="doc-val">{formData.ec_name}</div></div>
                                        <div className="doc-row"><div className="doc-label">Relation</div><div className="doc-val">{formData.ec_relation}</div></div>
                                        <div className="doc-row"><div className="doc-label">Mobile</div><div className="doc-val">{formData.ec_mobile}</div></div>
                                        <div className="doc-row"><div className="doc-label">Address</div><div className="doc-val">{formData.ec_address}</div></div>
                                    </Section>
                                </>
                            );
                        })()}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
