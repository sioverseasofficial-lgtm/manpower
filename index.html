<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emigration Clearance System</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- LZString for compression -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  
  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    const App = () => {
      const [isViewer, setIsViewer] = useState(false);
      const [isGenerating, setIsGenerating] = useState(false);
      const [data, setData] = useState({
        photo: null,
        ecNo: '', ecDate: '', name: '', birthDate: '', bloodGroup: '',
        passportNo: '', passportIssueDate: '', passportExpireDate: '',
        visaNo: '', visaIssueDate: '', visaExpireDate: '', referralNo: '',
        employer: '', country: '', agencyName: '', agencyLicense: '',
        agencyPhone: '', bmetNo: '', gender: '', nid: '', house: '',
        postOffice: '', policeStation: '', upazila: '', district: '',
        division: '', emName: '', emRelation: '', emMobile: '', emAddress: ''
      });
      
      const [generatedUrl, setGeneratedUrl] = useState('');
      const [toast, setToast] = useState('');
      const qrRef = useRef(null);

      useEffect(() => {
        const checkHash = () => {
          const hash = window.location.hash.substring(1);
          if (hash) {
            try {
              const decompressed = window.LZString.decompressFromEncodedURIComponent(hash);
              if (decompressed) {
                setData(JSON.parse(decompressed));
                setIsViewer(true);
              } else {
                setToast('Invalid or corrupted document link.');
              }
            } catch (e) {
              console.error("Failed to parse URL data", e);
              setToast('Error loading document data.');
            }
          }
        };
        
        checkHash();
        window.addEventListener('hashchange', checkHash);
        return () => window.removeEventListener('hashchange', checkHash);
      }, []);

      // Draw QR code when URL is generated
      useEffect(() => {
        if (generatedUrl && qrRef.current) {
          qrRef.current.innerHTML = '';
          new window.QRCode(qrRef.current, {
            text: generatedUrl,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : window.QRCode.CorrectLevel.M
          });
        }
      }, [generatedUrl]);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setData(prev => ({ ...prev, [name]: value }));
      };

      const handlePhotoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            setData(prev => ({ ...prev, photo: event.target.result }));
            setGeneratedUrl('');
          };
          reader.readAsDataURL(file);
        }
      };

      const generateLink = async () => {
        try {
          setIsGenerating(true);
          let currentPhoto = data.photo;

          if (currentPhoto && currentPhoto.startsWith('data:image')) {
            setToast('Uploading image to cloud...');
            const base64Data = currentPhoto.split(',')[1];
            
            const formData = new FormData();
            formData.append('image', base64Data);
            
            const response = await fetch(`https://api.imgbb.com/1/upload?key=2179a722075723ddb9a936c55164de3a`, {
              method: 'POST',
              body: formData
            });
            
            const result = await response.json();
            if (result.success) {
              currentPhoto = result.data.url;
              setData(prev => ({ ...prev, photo: currentPhoto }));
            } else {
              throw new Error('Image upload failed');
            }
          }

          setToast('Generating secure permanent link...');

          const payload = { ...data, photo: currentPhoto };
          const jsonStr = JSON.stringify(payload);
          const compressed = window.LZString.compressToEncodedURIComponent(jsonStr);
          
          const baseUrl = window.location.origin + window.location.pathname;
          const url = `${baseUrl}#${compressed}`;
          
          setGeneratedUrl(url);
          setToast('Link generated successfully!');
          setTimeout(() => setToast(''), 3000);
        } catch (error) {
          console.error("Error:", error);
          setToast("An error occurred while generating. Please try again.");
          setTimeout(() => setToast(''), 4000);
        } finally {
          setIsGenerating(false);
        }
      };

      const copyToClipboard = () => {
        navigator.clipboard.writeText(generatedUrl).then(() => {
          setToast('Link copied to clipboard!');
          setTimeout(() => setToast(''), 3000);
        });
      };

      const downloadQR = () => {
        if (!qrRef.current) return;
        // qr code js creates a canvas and an img tag
        const canvas = qrRef.current.querySelector("canvas");
        if (canvas) {
          const pngFile = canvas.toDataURL("image/png");
          const downloadLink = document.createElement("a");
          downloadLink.download = "qr-code.png";
          downloadLink.href = pngFile;
          downloadLink.click();
        }
      };

      const SectionHeader = ({ title }) => (
        <div className="section-header">
          <h3 className="section-title">{title}</h3>
          <div className="section-logos">
            <img src="1logo.png" alt="Icon" />
            <img src="logo2.png" alt="Icon" />
          </div>
        </div>
      );

      const InfoRow = ({ label, value }) => (
        <div className="info-row">
          <div className="info-label">{label}</div>
          <div className="info-value">{value || ''}</div>
        </div>
      );

      const DocumentView = () => (
        <div className="document-preview full-doc">
          <div className="doc-top-header">
            <img src="1logo.png" alt="Gov Logo" className="gov-logo" />
            <div className="header-text">
              <p className="gov-title">গণপ্রজাতন্ত্রী বাংলাদেশ সরকার</p>
              <p className="gov-sub">জনশক্তি কর্মসংস্থান ও প্রশিক্ষণ ব্যুরো</p>
            </div>
            <img src="logo2.png" alt="Logo 2" className="right-logo" />
          </div>
          
          <div className="doc-main-title">
            <h2>বহির্গমন ছাড়পত্র</h2>
            <h3>Emigration Clearance</h3>
          </div>
          
          <div className="doc-photo-section">
            <div className="doc-photo">
              {data.photo ? <img src={data.photo} alt="Applicant" crossOrigin="anonymous" /> : <div className="no-photo">No Photo</div>}
            </div>
            <h3 className="applicant-name">{data.name || 'NAME'}</h3>
            <p className="ec-no">EC No: {data.ecNo || 'N/A'}</p>
            <p className="ec-date">EC Date: {data.ecDate || 'N/A'}</p>
          </div>

          <div className="info-table-box">
            <InfoRow label="Birth Date" value={data.birthDate} />
            <InfoRow label="Blood Group" value={data.bloodGroup} />
            <InfoRow label="Passport No" value={data.passportNo} />
            <InfoRow label="Passport Issue Date" value={data.passportIssueDate} />
            <InfoRow label="Passport Expire Date" value={data.passportExpireDate} />
            <InfoRow label="Visa No" value={data.visaNo} />
            <InfoRow label="Visa Issue Date" value={data.visaIssueDate} />
            <InfoRow label="Visa Expire Date" value={data.visaExpireDate} />
            <InfoRow label="Referral No" value={data.referralNo} />
            <InfoRow label="Employer" value={data.employer} />
            <InfoRow label="Country" value={data.country} />
          </div>

          <SectionHeader title="Recruiting Agency" />
          <div className="info-table-box">
            <InfoRow label="Name" value={data.agencyName} />
            <InfoRow label="License No" value={data.agencyLicense} />
            <InfoRow label="Phone" value={data.agencyPhone} />
          </div>

          <SectionHeader title="BMET Registration" />
          <div className="info-table-box">
            <InfoRow label="BMET No" value={data.bmetNo} />
            <InfoRow label="Name" value={data.name} />
            <InfoRow label="Birth Date" value={data.birthDate} />
            <InfoRow label="Gender" value={data.gender} />
            <InfoRow label="NID" value={data.nid} />
          </div>

          <SectionHeader title="Passports" />
          <div className="info-table-box">
            <InfoRow label="Name" value={data.name} />
            <InfoRow label="Passport No 1" value={data.passportNo} />
          </div>

          <SectionHeader title="Permanent Address" />
          <div className="info-table-box">
            <InfoRow label="House/Vill/Road" value={data.house} />
            <InfoRow label="Post Office" value={data.postOffice} />
            <InfoRow label="Police Station" value={data.policeStation} />
            <InfoRow label="Upazila" value={data.upazila} />
            <InfoRow label="District" value={data.district} />
            <InfoRow label="Division" value={data.division} />
          </div>

          <SectionHeader title="Emergency Contact" />
          <div className="info-table-box">
            <InfoRow label="Name" value={data.emName} />
            <InfoRow label="Relation" value={data.emRelation} />
            <InfoRow label="Mobile" value={data.emMobile} />
            <InfoRow label="Address" value={data.emAddress} />
          </div>
        </div>
      );

      if (isViewer) {
        return (
          <div className="viewer-mode">
            <DocumentView />
            {toast && <div className="toast">{toast}</div>}
          </div>
        );
      }

      return (
        <div className="app-container">
          <div className="panel editor-panel">
            <h2>Create Emigration Clearance</h2>
            
            <div className="form-grid">
              <div className="form-group full-width">
                <label>Applicant Photo</label>
                <input type="file" accept="image/*" className="form-control" onChange={handlePhotoUpload} />
              </div>
              
              <div className="form-group"><label>EC No</label><input type="text" name="ecNo" className="form-control" value={data.ecNo} onChange={handleInputChange} /></div>
              <div className="form-group"><label>EC Date</label><input type="text" name="ecDate" className="form-control" value={data.ecDate} onChange={handleInputChange} /></div>
              
              <div className="form-group"><label>Full Name</label><input type="text" name="name" className="form-control" value={data.name} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Birth Date</label><input type="date" name="birthDate" className="form-control" value={data.birthDate} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Blood Group</label><input type="text" name="bloodGroup" className="form-control" value={data.bloodGroup} onChange={handleInputChange} /></div>
              
              <div className="form-group"><label>Passport No</label><input type="text" name="passportNo" className="form-control" value={data.passportNo} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Passport Issue Date</label><input type="date" name="passportIssueDate" className="form-control" value={data.passportIssueDate} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Passport Expire Date</label><input type="date" name="passportExpireDate" className="form-control" value={data.passportExpireDate} onChange={handleInputChange} /></div>
              
              <div className="form-group"><label>Visa No</label><input type="text" name="visaNo" className="form-control" value={data.visaNo} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Visa Issue Date</label><input type="date" name="visaIssueDate" className="form-control" value={data.visaIssueDate} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Visa Expire Date</label><input type="date" name="visaExpireDate" className="form-control" value={data.visaExpireDate} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Referral No</label><input type="text" name="referralNo" className="form-control" value={data.referralNo} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Employer</label><input type="text" name="employer" className="form-control" value={data.employer} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Country</label><input type="text" name="country" className="form-control" value={data.country} onChange={handleInputChange} /></div>
            </div>

            <h3>Agency & BMET</h3>
            <div className="form-grid">
              <div className="form-group"><label>Agency Name</label><input type="text" name="agencyName" className="form-control" value={data.agencyName} onChange={handleInputChange} /></div>
              <div className="form-group"><label>License No</label><input type="text" name="agencyLicense" className="form-control" value={data.agencyLicense} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Phone</label><input type="text" name="agencyPhone" className="form-control" value={data.agencyPhone} onChange={handleInputChange} /></div>
              
              <div className="form-group"><label>BMET No</label><input type="text" name="bmetNo" className="form-control" value={data.bmetNo} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Gender</label><input type="text" name="gender" className="form-control" value={data.gender} onChange={handleInputChange} /></div>
              <div className="form-group"><label>NID</label><input type="text" name="nid" className="form-control" value={data.nid} onChange={handleInputChange} /></div>
            </div>

            <h3>Address & Emergency</h3>
            <div className="form-grid">
              <div className="form-group"><label>House/Vill/Road</label><input type="text" name="house" className="form-control" value={data.house} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Post Office</label><input type="text" name="postOffice" className="form-control" value={data.postOffice} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Police Station</label><input type="text" name="policeStation" className="form-control" value={data.policeStation} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Upazila</label><input type="text" name="upazila" className="form-control" value={data.upazila} onChange={handleInputChange} /></div>
              <div className="form-group"><label>District</label><input type="text" name="district" className="form-control" value={data.district} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Division</label><input type="text" name="division" className="form-control" value={data.division} onChange={handleInputChange} /></div>
              
              <div className="form-group"><label>Emergency Name</label><input type="text" name="emName" className="form-control" value={data.emName} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Relation</label><input type="text" name="emRelation" className="form-control" value={data.emRelation} onChange={handleInputChange} /></div>
              <div className="form-group"><label>Mobile</label><input type="text" name="emMobile" className="form-control" value={data.emMobile} onChange={handleInputChange} /></div>
              <div className="form-group full-width"><label>Address</label><input type="text" name="emAddress" className="form-control" value={data.emAddress} onChange={handleInputChange} /></div>
            </div>

            <button 
              className="btn btn-primary full-width" 
              onClick={generateLink} 
              disabled={isGenerating}
              style={{ marginTop: '2rem', padding: '1rem', fontSize: '1.1rem', opacity: isGenerating ? 0.7 : 1 }}
            >
              {isGenerating ? 'Uploading to Cloud & Generating...' : 'Generate Global Permanent Link & QR Code'}
            </button>
          </div>

          <div className="panel preview-panel" style={{ background: 'transparent', boxShadow: 'none', padding: '0' }}>
            <DocumentView />
            
            {generatedUrl && (
              <div className="panel" style={{ marginTop: '2rem' }}>
                <h2>Generated Output</h2>
                <div className="qr-section">
                  <div className="qr-code-wrapper" ref={qrRef}>
                  </div>
                  <div style={{ display: 'flex', gap: '1rem', marginBottom: '1rem' }}>
                    <button className="btn btn-secondary" onClick={downloadQR}>Download QR Code</button>
                  </div>
                  <p style={{ marginBottom: '1rem', color: 'var(--text-muted)', fontSize: '0.875rem', textAlign: 'center' }}>
                    This is a global link! Scan the QR code or share the link below to access this document from any device.
                  </p>
                  <div className="link-container">
                    <input type="text" className="form-control link-input" value={generatedUrl} readOnly />
                    <button className="btn btn-primary" style={{ width: 'auto' }} onClick={copyToClipboard}>
                      Copy Link
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
          
          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
